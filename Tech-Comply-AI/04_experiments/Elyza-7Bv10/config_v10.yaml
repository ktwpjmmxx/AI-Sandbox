model_config:
  base_model: "elyza/ELYZA-japanese-Llama-2-7b-instruct"
  load_in_4bit: true
  max_seq_length: 2048
  dtype: null # 自動設定

lora_config:
  r: 64
  lora_alpha: 128
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0
  bias: "none"
  use_gradient_checkpointing: "unsloth"
  random_state: 3407

training_config:
  dataset_path: "traindata_v10.jsonl"
  output_dir: "outputs_v10"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: -1 # epochs優先
  num_train_epochs: 3
  learning_rate: 2e-4
  fp16: true # Tesla T4想定
  logging_steps: 1
  optim: "adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  seed: 3407