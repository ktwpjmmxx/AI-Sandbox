model_config:
  base_model: "elyza/ELYZA-japanese-Llama-2-7b-instruct"
  load_in_4bit: true
  max_seq_length: 2048
  dtype: null # 自動設定

lora_config:
  r: 32
  lora_alpha: 64 # 128->64: 過学習を防ぎ、日本語を自然にする
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.05  # 0.0->0.05: 柔軟性を持たせる
  bias: "none"
  use_gradient_checkpointing: "unsloth"
  random_state: 3407

training_config:
  dataset_path: "traindata_v13.jsonl"
  output_dir: "outputs_v13"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5 # 10から5に短縮。早期から本格学習を開始する狙い
  max_steps: 0
  num_train_epochs: 3.0 # データ数が十分あるため3epochで固定
  learning_rate: 1.5e-4   # 2e-4 -> 1.5e-4: 知識を壊さず性格を馴染ませる
  fp16: true
  logging_steps: 1
  optim: "adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  seed: 3407
  
  # v12追加設定
  save_strategy: "epoch" # エポックごとにチェックポイント保存
  save_total_limit: 3     # 最新3つのチェックポイントを保持
  load_best_model_at_end: false # 最終モデルを採用
  metric_for_best_model: "loss"
  greater_is_better: false
