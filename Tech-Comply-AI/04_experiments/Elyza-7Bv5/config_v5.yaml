# ============================================================
# Elyza-7B Unsloth Config
# ============================================================

model_name: "elyza/ELYZA-japanese-Llama-2-7b-instruct"
new_model_name: "Elyza-7B-Compliance-Consultant-v5-Unsloth"
train_file_path: "./train_data_v5.jsonl" # v4からv5に修正

peft_config:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training_arguments:
  output_dir: "./results_unsloth"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.0001 # 1e-4
  warmup_steps: 10
  logging_steps: 1
  save_steps: 50
  max_seq_length: 1024 # 学習時の効率を考え1024に調整

inference:
  max_new_tokens: 1024
  temperature: 0.6
  top_p: 0.9